<!DOCTYPE html>
<html>
<head>
  <title>Erro no Servidor (500) - Certificate Generate</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
    .error-card { text-align: center; max-width: 500px; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    .error-code { font-size: 80px; font-weight: bold; color: #dc3545; }
    .btn-home { background: #6c757d; border: none; padding: 12px 30px; border-radius: 50px; color: white; font-weight: bold; text-decoration: none; display: inline-block; transition: transform 0.2s; }
    .btn-home:hover { transform: scale(1.05); color: white; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code">500</div>
    <h2 class="mb-3 fw-bold">Erro Interno</h2>
    <p class="text-muted mb-4">Lamentamos, mas algo deu errado em nossos servidores. Nossa equipe já foi notificada.</p>
    <a href="/" class="btn-home">Recarregar Página</a>
  </div>
</body>
</html>
